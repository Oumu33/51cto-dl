name: Build EXE

on:
  push:
    tags:
      - "v*"          # 打 tag 自动触发，如 git tag v1.0 && git push --tags
  workflow_dispatch:  # 也可以在 GitHub 网页上手动触发

env:
  PLAYWRIGHT_BROWSERS_PATH: "0"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 显示关键依赖版本
        run: |
          python -m PyInstaller --version
          python -c "import playwright; print('playwright:', playwright.__version__)"
          python -c "import customtkinter; print('customtkinter:', customtkinter.__version__)"

      - name: 下载 Chromium
        run: python -m playwright install chromium

      - name: 显示 Playwright 浏览器路径
        run: |
          python -c "import playwright; from pathlib import Path; pw_dir = Path(playwright.__file__).parent; print('Playwright dir:', pw_dir); import os; browsers = list(pw_dir.rglob('chromium*')); [print('Found:', b) for b in browsers[:5]]"

      - name: 下载 N_m3u8DL-RE
        shell: pwsh
        run: |
          $api = "https://api.github.com/repos/nilaoda/N_m3u8DL-RE/releases/latest"
          $release = Invoke-RestMethod -Uri $api `
            -Headers @{ "User-Agent": "Mozilla/5.0"; "Accept": "application/vnd.github.v3+json" }
          $asset = $release.assets | Where-Object { $_.name -like "*win-x64*.zip" } | Select-Object -First 1
          Write-Host "下载 $($asset.name) ..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "N_m3u8DL-RE.zip"
          Expand-Archive -Path "N_m3u8DL-RE.zip" -DestinationPath "n_temp" -Force
          $exe = Get-ChildItem -Path "n_temp" -Filter "N_m3u8DL-RE*.exe" -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName "N_m3u8DL-RE.exe"
          Remove-Item "N_m3u8DL-RE.zip", "n_temp" -Recurse -Force
          Write-Host "完成: $((Get-Item N_m3u8DL-RE.exe).Length) bytes"

      - name: PyInstaller 打包
        run: python -m PyInstaller build.spec --clean --noconfirm --log-level WARN

      - name: 查看输出
        run: dir dist

      # ── 上传到 GitHub Release（打 tag 时自动创建）─────────────────
      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/51CTO下载器.exe
          name: "51CTO 下载器 ${{ github.ref_name }}"
          body: |
            ## 使用方法
            1. 下载 `51CTO下载器.exe`
            2. 双击运行，无需安装任何软件
            3. 扫码登录 → 选择课程 → 开始下载

      # ── 手动触发时上传为 Artifact（不创建 Release）───────────────
      - name: 上传 Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: 51CTO下载器
          path: dist/51CTO下载器.exe
          retention-days: 7
