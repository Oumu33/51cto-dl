name: Build EXE

on:
  push:
    tags:
      - "v*"          # 打 tag 自动触发，如 git tag v1.0 && git push --tags
  workflow_dispatch:  # 也可以在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 下载 Chromium（打包到 playwright 包目录内）
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: python -m playwright install chromium

      - name: 下载 N_m3u8DL-RE
        shell: python
        run: |
          import json, urllib.request, zipfile, sys
          from pathlib import Path

          api = "https://api.github.com/repos/nilaoda/N_m3u8DL-RE/releases/latest"
          req = urllib.request.Request(api, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req) as r:
              data = json.load(r)

          asset = next(
              a for a in data["assets"]
              if "win-x64" in a["name"] and a["name"].endswith(".zip")
          )
          print(f"下载 {asset['name']}...")
          urllib.request.urlretrieve(asset["browser_download_url"], "N_m3u8DL-RE.zip")

          with zipfile.ZipFile("N_m3u8DL-RE.zip") as z:
              for name in z.namelist():
                  if name.endswith(".exe") and "N_m3u8DL-RE" in name:
                      Path("N_m3u8DL-RE.exe").write_bytes(z.read(name))
                      print(f"解压完成：N_m3u8DL-RE.exe")
                      break

      - name: PyInstaller 打包
        run: python -m PyInstaller build.spec --clean --noconfirm

      - name: 查看输出
        run: dir dist

      # ── 上传到 GitHub Release（打 tag 时自动创建）─────────────────
      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/51CTO下载器.exe
          name: "51CTO 下载器 ${{ github.ref_name }}"
          body: |
            ## 使用方法
            1. 下载 `51CTO下载器.exe`
            2. 双击运行，无需安装任何软件
            3. 扫码登录 → 选择课程 → 开始下载

      # ── 手动触发时上传为 Artifact（不创建 Release）───────────────
      - name: 上传 Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: 51CTO下载器
          path: dist/51CTO下载器.exe
          retention-days: 7
