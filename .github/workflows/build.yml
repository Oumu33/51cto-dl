name: Build EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: python -m playwright install chromium

      - name: 下载 N_m3u8DL-RE
        run: |
          $url = "https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.5.1-beta/N_m3u8DL-RE_v0.5.1-beta_win-x64_20251029.zip"
          Invoke-WebRequest -Uri $url -OutFile "N_m3u8DL-RE.zip"
          Expand-Archive -Path "N_m3u8DL-RE.zip" -DestinationPath "." -Force
          Remove-Item "N_m3u8DL-RE.zip"
          Get-Item "N_m3u8DL-RE.exe"

      - name: PyInstaller 打包
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: python -m PyInstaller build.spec --clean --noconfirm

      - name: 查看输出
        run: dir dist

      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 51CTO-Downloader
          path: dist/*.exe
          retention-days: 7
