name: Build EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 准备构建环境
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: python download_deps.py

      - name: PyInstaller 打包
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: python -m PyInstaller build.spec --clean --noconfirm

      - name: 查看输出
        run: dir dist

      - name: 发布 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/51CTO下载器.exe
          name: "51CTO 下载器 ${{ github.ref_name }}"
          body: |
            ## 使用方法
            1. 下载 `51CTO下载器.exe`
            2. 双击运行，无需安装任何软件
            3. 扫码登录 → 选择课程 → 开始下载

      - name: 上传 Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: 51CTO下载器
          path: dist/51CTO下载器.exe
          retention-days: 7
